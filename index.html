<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <main>
        <div class="container d-flex text-center justify-content-center align-items-center vh-100">
            <div class="card shadow p-4" style="width : 100%; max-width: 400px;">


                <h1><span id="titulo">Login</span></h1>

                <form action="" id="Login">
                    <div class=" mb-3" id="c-email">
                        <label class="col-sm-2 col-form-label" for="email">Email</label>
                        <input class="form-label w-50 p-1 h-25" type="email" name="email" id="email">
                    </div>
                    <div class="mb-3" id="c-senha">
                        <label class="col-sm-2 col-form-label" for="senha">Senha</label>
                        <input class="form-label w-50 p-1 h-25" type="password" name="senha" id="senha">
                    </div>
                    <div class="toggle">
                        <p>Não possui conta?<a href="#"> Cadastre-se</a></p>
                    </div>
                    <button class="btn btn-outline-primary" type="submit">Enviar</button>
                </form>



            </div>
        </div>
    </main>

</body>

</html>
